<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Notes</title>
</head>
<body>
    <h1>Gemini Notes</h1>
    <a href="{{ url_for('add_note') }}">Add New Note</a>
    <hr>
    <h2>Your Notes:</h2>
    {% if notes %}
        <ul>
            {% for note in notes %}
                <li>{{ note.content }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No notes yet. Add one!</p>
    {% endif %}
</body>
</html>
