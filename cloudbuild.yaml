steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/${PROJECT_ID}/flask-demo-notes/flask-demonotes-app:${COMMIT_SHA}', '.']
  dir: 'flask_demonotes'
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/${PROJECT_ID}/flask-demo-notes/flask-demonotes-app:${COMMIT_SHA}']
  dir: 'flask_demonotes'
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['run', 'deploy', 'flask-demonotes-app', '--image', 'gcr.io/${PROJECT_ID}/flask-demo-notes/flask-demonotes-app:${COMMIT_SHA}', '--region', 'us-central1', '--platform', 'managed', '--allow-unauthenticated', '--project', '${PROJECT_ID}']
  dir: 'flask_demonotes'
images:
- 'gcr.io/${PROJECT_ID}/flask-demo-notes/flask-demonotes-app:${COMMIT_SHA}'
options:
 logging: CLOUD_LOGGING_ONLY
